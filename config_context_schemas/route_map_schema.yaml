---
_metadata:
  name: route_maps
  description: Route-maps for BGP neighbors (used for in/out policy).
data_schema:
  type: object
  properties:
    route_maps:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          sequence:
            type: integer
          action:
            type: string
            enum: ["permit", "deny"]
          match_prefix_list:
            type: string
          set_actions:
            type: array
            items:
              type: object
              properties:
                action:
                  type: string
                  description: "e.g., local-preference 50, metric 100, origin incomplete, community 65000:100"
              required: ["action"]
        required: ["name", "sequence", "action"]
  required: ["route_maps"]
